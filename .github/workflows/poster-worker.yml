name: Poster Auto-Generation Worker

on:
  schedule:
    # 매주 월요일 UTC 00:00 = KST 09:00
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run regardless of schedule'
        required: false
        type: boolean
        default: false

env:
  GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
  ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
  INTERNAL_SHEET_ID: ${{ secrets.INTERNAL_SHEET_ID }}

# 동시 실행 방지
concurrency:
  group: poster-worker
  cancel-in-progress: false

jobs:
  generate-posters:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build worker
        run: npm run build:worker

      - name: Run poster generation worker
        run: npm run worker:run
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          INTERNAL_SHEET_ID: ${{ secrets.INTERNAL_SHEET_ID }}
