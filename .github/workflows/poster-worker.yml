name: Poster Worker

on:
  schedule:
    # GitHub Actions cron은 UTC 기준
    # 예: KST 월요일 09:00 = UTC 월요일 00:00
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

concurrency:
  group: poster-worker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # ✅ 여기: 워커는 dist/main.js를 돌리므로 빌드가 필요
      - name: Build shared + worker
        run: |
          npm run build:shared
          npm run build:worker

      # ✅ 여기: 실제 실행 커맨드 (너 레포에 이미 존재)
      - name: Run worker
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          INTERNAL_SHEET_ID: ${{ secrets.INTERNAL_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run worker:run
